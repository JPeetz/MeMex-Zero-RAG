#info-panel .cl{max-height:120px;overflow-y:auto;margin-top:4px;font-size:11px;color:#8b949e}
#info-panel .cl span{display:inline-block;background:#21262d;padding:2px 6px;border-radius:4px;margin:2px;font-size:10px}
#stats{position:fixed;bottom:20px;left:20px;font-size:11px;color:#8b949e;background:rgba(13,17,23,0.85);padding:8px 14px;border-radius:8px;border:1px solid #30363d;z-index:99}

#status-overlay .bar{width:200px;height:4px;background:#21262d;border-radius:2px;margin:12px auto 0;overflow:hidden}

        }
        if (keys.length > 50) html += '<br><span style="color:#555">... and ' + (keys.length-50) + ' more</span>';
        document.getElementById('nconn').innerHTML = html || '<span style="color:#444">none</span>';
        panel.classList.add('on');
      } else {
        panel.classList.remove('on');
      }
    });
    
    // Double-click zoom
    net.on('doubleClick', function(p) {
      if (p.nodes.length > 0) net.focus(p.nodes[0], {scale: 2, animation: {duration: 500}});
    });
    
    progress('Ready!', 100);
    setTimeout(function() { document.getElementById('status-overlay').style.display = 'none'; }, 1500);
    
  } catch(e) {
    document.getElementById('status-text').textContent = 'ERROR: ' + e.message;
    document.getElementById('status-overlay').querySelector('.big').textContent = '&#x26A0; Initialization Failed';
    console.error(e);
  }
}

window.doSearch = function(q) {
  if (!nodes) return;
  q = q.toLowerCase();
  nodes.forEach(function(n) {
    if (!q) {
      nodes.update({id: n.id, opacity: 1, font: {color: '#e6edf3', size: n.shape==='diamond'?12:9}});
      return;
    }
    var m = (nodeMap[n.id] ? nodeMap[n.id].l.toLowerCase().indexOf(q) >= 0 : false) || 
            n.type.toLowerCase().indexOf(q) >= 0 || 
            (n.group||'').toLowerCase().indexOf(q) >= 0;
    nodes.update({id: n.id, opacity: m ? 1 : 0.04, font: {color: m ? '#e6edf3' : '#222', size: n.shape==='diamond'?12:9}});
  });
};

window.resetView = function() {
  if (net) net.fit({animation: {duration: 600}});
};

window.filterType = function(t) {
  if (!nodes) return;
  document.querySelectorAll('#controls .btn').forEach(function(b){b.classList.remove('act')});
  document.querySelectorAll('#controls .btn').forEach(function(b){
    if (b.textContent.toLowerCase().indexOf(t.toLowerCase()) >= 0) b.classList.add('act');
  });
  nodes.forEach(function(n) {
    if (t === 'all') {
      nodes.update({id: n.id, opacity: 1, hidden: false});
    } else if (t === 'betterlife') {
      var v = (n.group||'').toLowerCase().indexOf('betterlife') >= 0 || n.type === 'betterlife';
      nodes.update({id: n.id, opacity: v ? 1 : 0.03, hidden: !v});
    } else {
      var v = n.type === t;
      nodes.update({id: n.id, opacity: v ? 1 : 0.03, hidden: !v});
    }
  });
};
</script>
